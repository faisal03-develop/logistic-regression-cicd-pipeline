<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Credit Risk Classifier</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 24px;
            background: #f3f4f6;
            color: #111827;
        }
        .container {
            max-width: 820px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 10px;
            padding: 24px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
        }
        h1 {
            margin-top: 0;
            font-size: 1.5rem;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px;
        }
        label {
            display: block;
            font-size: 0.9rem;
            margin-bottom: 4px;
        }
        input {
            width: 100%;
            box-sizing: border-box;
            padding: 10px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
        }
        button {
            margin-top: 16px;
            border: 0;
            background: #2563eb;
            color: white;
            padding: 10px 14px;
            border-radius: 8px;
            cursor: pointer;
        }
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .result {
            margin-top: 18px;
            padding: 12px;
            border-radius: 8px;
            background: #f9fafb;
            border: 1px solid #e5e7eb;
            white-space: pre-wrap;
        }
        .hint {
            font-size: 0.85rem;
            color: #6b7280;
            margin-top: 6px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Credit Risk Classifier Frontend</h1>
        <p>Submit applicant features and get real-time prediction from your Flask backend.</p>

        <form id="predict-form">
            <div class="grid">
                <div><label for="age">Age</label><input id="age" type="number" value="35" required></div>
                <div><label for="income">Income</label><input id="income" type="number" value="65000" required></div>
                <div><label for="credit_score">Credit Score</label><input id="credit_score" type="number" value="680" required></div>
                <div><label for="loan_amount">Loan Amount</label><input id="loan_amount" type="number" value="25000" required></div>
                <div><label for="loan_tenure_months">Loan Tenure (months)</label><input id="loan_tenure_months" type="number" value="36" required></div>
                <div><label for="debt_to_income_ratio">Debt To Income Ratio</label><input id="debt_to_income_ratio" type="number" step="0.01" value="0.30" required></div>
                <div><label for="num_open_accounts">Open Accounts</label><input id="num_open_accounts" type="number" value="5" required></div>
                <div><label for="num_credit_inquiries">Credit Inquiries</label><input id="num_credit_inquiries" type="number" value="2" required></div>
                <div><label for="months_employed">Months Employed</label><input id="months_employed" type="number" value="48" required></div>
                <div><label for="has_mortgage">Has Mortgage (0/1)</label><input id="has_mortgage" type="number" min="0" max="1" value="0" required></div>
            </div>
            <button id="submit-btn" type="submit">Predict Risk</button>
            <div class="hint">Frontend route: <code>/app</code>, API route: <code>/predict</code></div>
        </form>

        <div id="result" class="result">Prediction output will appear here.</div>
    </div>

    <script>
        const form = document.getElementById("predict-form");
        const resultEl = document.getElementById("result");
        const submitBtn = document.getElementById("submit-btn");

        const fields = [
            "age",
            "income",
            "credit_score",
            "loan_amount",
            "loan_tenure_months",
            "debt_to_income_ratio",
            "num_open_accounts",
            "num_credit_inquiries",
            "months_employed",
            "has_mortgage",
        ];

        form.addEventListener("submit", async (event) => {
            event.preventDefault();
            submitBtn.disabled = true;
            resultEl.textContent = "Requesting prediction...";

            const payload = {};
            for (const field of fields) {
                payload[field] = Number(document.getElementById(field).value);
            }

            try {
                const response = await fetch("/predict", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload),
                });
                const data = await response.json();
                resultEl.textContent = JSON.stringify(data, null, 2);
            } catch (error) {
                resultEl.textContent = `Request failed: ${error.message}`;
            } finally {
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
