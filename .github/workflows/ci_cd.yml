name: CI/CD — Credit Risk Classifier

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  IMAGE_NAME: credit-risk-classifier

jobs:
  # ============================================================
  # JOB 1: Lint, generate data, train, test
  # ============================================================
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate synthetic dataset
        run: |
          echo "🔧 Generating dataset..."
          python data/generate_data.py --samples 5000
          echo "✅ Dataset generated: $(wc -l < data/dataset.csv) rows"

      - name: Train model
        run: |
          echo "🚀 Training model..."
          python -m src.train --lr 0.05 --iters 1000
          echo "✅ Model trained successfully"
          cat models/metrics.txt

      - name: Verify model artifacts
        run: |
          echo "📦 Checking artifacts..."
          ls -lh models/
          [ -f models/model.pkl ]   && echo "✅ model.pkl exists"   || (echo "❌ model.pkl missing!"   && exit 1)
          [ -f models/scaler.pkl ]  && echo "✅ scaler.pkl exists"  || (echo "❌ scaler.pkl missing!"  && exit 1)
          [ -f models/metrics.txt ] && echo "✅ metrics.txt exists" || (echo "❌ metrics.txt missing!" && exit 1)

      - name: Run tests
        run: |
          echo "🧪 Running pytest..."
          pytest tests/ -v --tb=short --color=yes
          echo "✅ All tests passed"

      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs
          path: |
            models/
            data/dataset.csv

  # ============================================================
  # JOB 2: Docker build + container health check
  # ============================================================
  docker:
    name: Docker Build & Health Check
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python to regenerate artifacts
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Regenerate artifacts for Docker image
        run: |
          pip install -r requirements.txt
          python data/generate_data.py
          python -m src.train --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          echo "🐳 Building Docker image..."
          docker build -t ${{ env.IMAGE_NAME }}:${{ github.sha }} .
          docker tag ${{ env.IMAGE_NAME }}:${{ github.sha }} ${{ env.IMAGE_NAME }}:latest
          echo "✅ Image built: ${{ env.IMAGE_NAME }}:latest"

      - name: Run Docker container
        run: |
          echo "🚀 Starting container..."
          docker run -d \
            --name credit-risk-api \
            -p 5000:5000 \
            -e FLASK_DEBUG=false \
            ${{ env.IMAGE_NAME }}:latest
          echo "⏳ Waiting for container to start..."
          sleep 10

      - name: Health check
        run: |
          echo "🏥 Running health check..."
          for i in {1..5}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5000/health)
            echo "  Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "✅ Health check passed!"
              break
            fi
            if [ $i -eq 5 ]; then
              echo "❌ Health check failed after 5 attempts"
              docker logs credit-risk-api
              exit 1
            fi
            sleep 5
          done

      - name: Smoke test — index endpoint
        run: |
          echo "💨 Smoke test: GET /"
          curl -s http://localhost:5000/ | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          assert data['status'] == 'success', f'Expected success, got: {data}'
          print('✅ Index endpoint OK')
          "

      - name: Smoke test — metrics endpoint
        run: |
          echo "💨 Smoke test: GET /metrics"
          curl -s http://localhost:5000/metrics | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          assert 'metrics' in data, f'Missing metrics key: {data}'
          print('✅ Metrics endpoint OK')
          "

      - name: Smoke test — predict endpoint
        run: |
          echo "💨 Smoke test: POST /predict"
          curl -s -X POST http://localhost:5000/predict \
            -H "Content-Type: application/json" \
            -d '{
              "age": 35,
              "income": 65000,
              "credit_score": 680,
              "loan_amount": 25000,
              "loan_tenure_months": 36,
              "debt_to_income_ratio": 0.3,
              "num_open_accounts": 5,
              "num_credit_inquiries": 2,
              "months_employed": 48,
              "has_mortgage": 0
            }' | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          assert data['status'] == 'success', f'Expected success: {data}'
          assert 'result' in data, f'Missing result key: {data}'
          assert data['result']['prediction'] in (0, 1)
          print('✅ Predict endpoint OK')
          print(f'   Prediction: {data[\"result\"][\"risk_label\"]} ({data[\"result\"][\"probability\"]:.4f})')
          "

      - name: Stop container
        if: always()
        run: docker stop credit-risk-api && docker rm credit-risk-api

  # ============================================================
  # JOB 3: Deploy to Render (main branch only)
  # ============================================================
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: [build-and-test, docker]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Trigger Render deployment
        run: |
          echo "🚀 Triggering deployment to Render..."
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys" \
            -d '{}' \
            -H "Content-Type: application/json"
          echo "✅ Render deployment triggered"

      - name: Notify deployment status
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "🟢 Deployment triggered successfully on commit ${{ github.sha }}"
          else
            echo "🔴 Deployment trigger failed"
          fi
